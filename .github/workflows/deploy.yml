name: Deploy to GitHub Pages

on:
  push:
    branches: [main]

permissions:
  contents: read
  pages: write
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all history for complete deploy
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      # Skip npm install and build — out/ is pre-built and committed
      # Just ensure dependencies for any post-processing steps
      - name: Verify out directory exists
        run: |
          if [ ! -d "out" ]; then
            echo "Error: out/ directory not found"
            exit 1
          fi
          echo "out/ directory verified with $(find out -name '*.html' | wc -l) HTML files"
      - uses: actions/upload-pages-artifact@v3
        with:
          path: ./out

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/deploy-pages@v4
        id: deployment
